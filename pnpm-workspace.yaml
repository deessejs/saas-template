packages:
  - "apps/*"
  - "packages/*"
  - agents/*

# pnpm 11: explicit allowlist for build scripts
allowBuilds:
  '@mongodb-js/zstd': true
  '@prisma/client': true
  better-sqlite3: true
  esbuild: true
  node-liblzma: true
  sharp: true
  unrs-resolver: true

# Shared dependency versions — update here, propagate everywhere
catalog:
  # Core

  # Email (added 2026-07-07 — packages/email)
  "@react-email/components": ^1.0.12
  "@react-email/render": ^2.0.6
  resend: ^6.17.1

  # Auth
  "@better-auth/cli": ^1.4.21
  "@better-auth/drizzle-adapter": latest
  '@content-collections/cli': ^0.1.9
  '@content-collections/core': ^0.15.2
  '@content-collections/mdx': ^0.2.2
  '@content-collections/next': ^0.2.11

  # Next.js
  "@next/env": ^16.2.10
  '@orpc/client': ^1.14.7
  "@orpc/server": latest
  '@shikijs/rehype': ^4.3.1

  # Shared tooling
  "@tailwindcss/postcss": ^4.3.2
  "@turbo/gen": ^2.10.4

  # Types
  "@types/node": ^24
  "@types/pg": ^8.20.0
  "@types/react": ^19.2.17
  "@types/react-dom": ^19.2.3
  "@vitest/coverage-v8": ^4.1.10
  better-auth: latest
  cmdk: ^1.1.1

  # Database
  dotenv: ^17.4.2
  drizzle-kit: ^0.31.10
  drizzle-orm: ^0.45.2
  eslint: ^9.39.4
  "eslint-config-next": ^16.2.10
  fuse.js: ^7.4.2

  # API
  hono: latest
  just-bash: ^3.0.2

  # Icons
  lucide-react: ^1.23.0
  "next": ^16.2.10
  pg: ^8.22.0
  portless: ^0.15.1
  postgres: ^3.4.9
  react: 19.2.7
  react-dom: 19.2.7
  reading-time: ^1.5.0
  sonner: ^2.0.7

  # UI
  tailwind-merge: ^3.6.0
  typescript: ^6.0.3
  vercel-minimax-ai-provider: ^0.0.2

  # Testing
  vitest: ^4.1.10
  zod: latest
  zustand: ^5.0.14

# Strict mode: all dependencies MUST come from a catalog
catalogMode: strict

minimumReleaseAgeExclude:
  - "@ai-sdk/*"
  - "@rolldown/*"
  - "@vercel/*"
  - "@workflow/*"
  - ai
  - experimental-ai-sdk-code-mode
  - nitro
  - rolldown
  - workflow
  - eve

# Force single version of @types/react across the tree to avoid duplicate-type errors
overrides:
  "@types/react": ^19.2.17
  "@types/react-dom": ^19.2.3
