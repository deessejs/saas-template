packages:
  - "apps/*"
  - "packages/*"
  - "agent/web"

# pnpm 11: explicit allowlist for build scripts
allowBuilds:
  '@mongodb-js/zstd': true
  '@prisma/client': true
  better-sqlite3: true
  esbuild: true
  node-liblzma: true
  sharp: true
  unrs-resolver: true

# Shared dependency versions — update here, propagate everywhere
catalog:
  # Core
  "@better-auth/drizzle-adapter": latest
  '@content-collections/cli': ^0.1.9
  '@content-collections/core': ^0.15.2
  '@content-collections/mdx': ^0.2.2
  '@content-collections/next': ^0.2.11
  '@orpc/client': ^1.14.6
  "@orpc/server": latest
  '@shikijs/rehype': ^4.3.0

  # Shared tooling
  "@tailwindcss/postcss": ^4
  "@turbo/gen": ^2.10.1

  # Types
  "@types/node": ^20
  "@types/pg": ^8.11.0
  "@types/react": ^19
  "@types/react-dom": ^19
  "@vitest/coverage-v8": ^4.1.7

  # Auth
  better-auth: latest
  cmdk: ^1.1.1
  drizzle-kit: ^0.30.0

  # Database
  drizzle-orm: ^0.40.0
  fuse.js: ^7.4.2

  # API
  hono: latest
  just-bash: ^3.0.2

  # Icons
  lucide-react: ^1.22.0

  # UI
  tailwind-merge: ^3

  # Next.js
  "next": ^16.2.6
  pg: ^8.15.0
  portless: ^0.15.1
  postgres: ^3.4.0
  react: 19.2.4
  react-dom: 19.2.4
  reading-time: ^1.5.0
  sonner: ^2.0.7
  typescript: ^5.9.3
  vercel-minimax-ai-provider: ^0.0.2

  # Testing
  vitest: ^4.1.5
  zod: latest
  zustand: ^5.0.14

# Strict mode: all dependencies MUST come from a catalog
catalogMode: strict

minimumReleaseAgeExclude:
  - "@ai-sdk/*"
  - "@rolldown/*"
  - "@vercel/*"
  - "@workflow/*"
  - ai
  - experimental-ai-sdk-code-mode
  - eve
  - nitro
  - rolldown
  - workflow
